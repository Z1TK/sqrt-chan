services:
  database:
    image: postgres:16
    container_name: database
    restart: always
    environment:
      POSTGRES_USER: ${APP_DB_USER}
      POSTGRES_DB: ${APP_DB_NAME}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER} -d ${APP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build:
      context: .
    env_file:
      - .env
    restart: always
    command: sh -c "uv run alembic upgrade head && uvicorn backend.main:app --reload --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    container_name: app
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data: